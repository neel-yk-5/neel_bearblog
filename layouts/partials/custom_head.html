<style>
  html.dark {
    --background-color: #0f1f26;
    --heading-color: #e8e8e8;
    --text-color: #c8d0d4;
    --link-color: #7ec8e3;
    --visited-color: #a98fd4;
    --blockquote-color: #9aadb5;
  }
  html.light {
    --background-color: #faf9f7;
    --heading-color: #1a1a1a;
    --text-color: #3a3a3a;
    --link-color: #2563eb;
    --visited-color: #7c3aed;
    --blockquote-color: #555;
  }

  /* font and reading experience */
  body {
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 1.1rem;
    line-height: 1.75;
  }

  main p {
    margin-bottom: 1.4em;
  }

  h1, h2, h3, h4, h5, h6 {
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    line-height: 1.3;
    letter-spacing: -0.02em;
  }

  /* mobile — slightly smaller base so text doesn't crowd */
  @media (max-width: 600px) {
    body {
      font-size: 1.05rem;
      padding: 16px;
    }
  }

  #theme-toggle {
    position: fixed;
    top: 1rem;
    right: 1rem;
    background: none;
    border: 1px solid var(--text-color);
    color: var(--text-color);
    border-radius: 4px;
    padding: 4px 10px;
    font-size: 0.8em;
    cursor: pointer;
    opacity: 0.6;
  }
  #theme-toggle:hover {
    opacity: 1;
  }
</style>
<script>
  (function () {
    var saved = localStorage.getItem('theme');
    var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    if (saved === 'dark' || (!saved && prefersDark)) {
      document.documentElement.classList.add('dark');
    } else {
      document.documentElement.classList.add('light');
    }
  })();
</script>
