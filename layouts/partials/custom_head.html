<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Literata:ital,opsz,wght@0,7..72,300..900;1,7..72,300..900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  html.light {
    --background-color: #ffffff;
    --heading-color: #050505;
    --text-color: #0f0f0f;
    --link-color: #1d6fa4;
    --visited-color: #7b5ea7;
    --blockquote-color: #777777;
  }
  html.dark {
    --background-color: #191917;
    --heading-color: #eeebe3;
    --text-color: #c8c4bc;
    --link-color: #7ab4cf;
    --visited-color: #aa8ec8;
    --blockquote-color: #8c8884;
  }

  body {
    font-family: 'Literata', Georgia, serif;
    font-optical-sizing: auto;
    font-size: 1.2rem;
    line-height: 1.85;
    max-width: 680px;
  }

  h1, h2, h3, h4, h5, h6 {
    font-family: 'Literata', Georgia, serif;
    font-optical-sizing: auto;
    font-weight: 700;
    line-height: 1.2;
    letter-spacing: -0.01em;
    margin-top: 1.25em;
    margin-bottom: 0.4em;
  }

  main p {
    margin-bottom: 1.6em;
  }

  time {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    letter-spacing: 0.03em;
  }

  code {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.9em;
  }

  @media (max-width: 600px) {
    body {
      font-size: 1.05rem;
      line-height: 1.8;
      padding: 20px;
    }
  }

  #theme-toggle {
    position: fixed;
    top: 1rem;
    right: 1rem;
    background: none;
    border: 1px solid var(--text-color);
    color: var(--text-color);
    border-radius: 4px;
    padding: 4px 10px;
    font-size: 0.75em;
    font-family: 'JetBrains Mono', monospace;
    cursor: pointer;
    opacity: 0.45;
  }
  #theme-toggle:hover {
    opacity: 1;
  }
</style>

<script>
  (function () {
    var saved = localStorage.getItem('theme');
    var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    if (saved === 'dark' || (!saved && prefersDark)) {
      document.documentElement.classList.add('dark');
    } else {
      document.documentElement.classList.add('light');
    }
  })();
</script>
